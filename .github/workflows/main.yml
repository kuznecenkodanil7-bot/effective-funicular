name: Build Desktop Game

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  build-windows:
    name: Build Windows EXE
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pygame pyinstaller

      - name: Build EXE
        run: |
          pyinstaller --onefile --windowed --name ProtocolSobesednik main.py

      - name: Upload Windows build
        uses: actions/upload-artifact@v4
        with:
          name: ProtocolSobesednik-Windows
          path: dist/ProtocolSobesednik.exe
